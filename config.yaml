# C-by-B Prototype Configuration
# All service config, model mappings, thresholds in one place.
# Secrets (API keys) go in .env (gitignored).

# ---------------------------------------------------------------------------
# Evaluator class — determines output richness and workflow shape
# ---------------------------------------------------------------------------
evaluator_class: action_shaper
# Options: gate_keeper, gate_keeper_plus, action_shaper,
#          action_shaper_emergency, action_shaper_strategic

# ---------------------------------------------------------------------------
# Evaluation mode — controls UI default (overridden by toggle)
# ---------------------------------------------------------------------------
evaluation_mode: basic
# Options: basic (heads decide, local rationale),
#          expanded (judicial evaluator decides, heads advisory)

# ---------------------------------------------------------------------------
# Services — each role maps to an endpoint + model
# ---------------------------------------------------------------------------
services:

  # Request parser: turns raw prompt into structured request JSON
  # Uses cbyb1 model locally (generative mode) in prototype;
  # swappable to dedicated model or API in production
  request_parser:
    provider: local_mlx
    model_path: llm/cbyb1-4B-4bit
    temperature: 0.0
    max_tokens: 1024

  # Cognitive Twin: generates and revises action proposals
  cognitive_twin:
    provider: groq
    endpoint: https://api.groq.com/openai/v1
    model: qwen/qwen3-32b
    temperature: 0.7
    top_p: 0.8
    max_tokens: 8192

  # Embedder: embeds action text, retrieves evidence from corpus
  embedder:
    provider: nscale
    endpoint: https://inference.api.nscale.com/v1
    model: Qwen/Qwen3-Embedding-8B
    corpus_path: data/embeddings/qwen-embed-8b/triples/
    thresholds:
      T: 0.90    # Tight — strong relevance / entailment neighborhood
      G: 0.50    # Generous — action-compatible halo (prevents drift)
      P: 0.97    # Paraphrasic — dedup threshold
    max_expansion_rounds: 10

  # Evaluator: custom 3-call pipeline (not OpenAI-compatible)
  evaluator:
    provider: local_mlx
    model_path: llm/cbyb1-4B-4bit
    # Pipeline config inherited from model's cbyb_config.json:
    #   decision_head: L19, 100-seed MLP ensemble
    #   evidence_head: L15, attn_mlp
    #   cascade: pct_veto=90, pct_approve=90
    rationale_temperature: 0.0
    rationale_max_tokens: 4096

  # Judicial Evaluator: generative evaluator for Expanded mode
  # Uses round-rotation strategy with harm knowledge injection.
  # Heads provide advisory signal; this service makes the decision.
  judicial_evaluator:
    provider: local_mlx
    model: llm/cbyb1-4B-4bit
    # provider: groq
    # endpoint: https://api.groq.com/openai/v1
    # model: qwen/qwen3-32b
    temperature: 0.0             # Deterministic judicial assessment
    max_tokens: 8192
    min_approval_round: 4        # Cannot APPROVE before this round
    harm_knowledge_path: cbyb/evaluator/harm_knowledge.yaml

# ---------------------------------------------------------------------------
# Safety Socket — orchestration parameters
# ---------------------------------------------------------------------------
socket:
  max_rounds: 7
  terminal_on_exhaust: ESCALATE
  # Options: ESCALATE, VETO

# ---------------------------------------------------------------------------
# Telemetry — event logging and contract output
# ---------------------------------------------------------------------------
telemetry:
  output_path: results/
  log_level: INFO

# ---------------------------------------------------------------------------
# Flask — web serving
# ---------------------------------------------------------------------------
flask:
  port: 5050
  debug: false
  rate_limit: "10/minute"
  max_prompt_length: 5000
  max_queue_depth: 3
