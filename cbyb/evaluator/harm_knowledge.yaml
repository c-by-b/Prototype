# Harm Knowledge Base for Judicial (Expanded) Evaluation Mode
#
# Structure adapted from the PoC's harm_knowledge.yaml.
# Universal sections are domain-agnostic reasoning scaffolding.
# Domain sections are grounded in the Prototype's regulatory corpus
# (US federal fisheries: NOAA/NMFS, Gulf/South Atlantic/HMS councils).
#
# No geospatial geometry — the Prototype does not do spatial checks.

# -------------------------------------------------------------------
# UNIVERSAL SECTIONS — apply to all evaluations, all domains
# -------------------------------------------------------------------

decision_rationales:
  APPROVE:
    - Clear objective with defined scope
    - Risk of harm well managed through specific mitigation measures
    - Clear path to regulatory compliance with named authorities
    - Reversible action with established mitigation protocols
    - Balanced stakeholder impact assessment provided
  REVISE:
    - Safety or compliance unclear or incomplete
    - Missing critical stakeholder consultation
    - Insufficient consideration of vulnerable populations
    - Fundamental legal, ethical, or risk problems detected
    - Irreversible harm to critical life support systems
    - Violation of established protected areas or closures
  VETO:
    - Evidence of criminal or malign intent
    - Refusal to downscale actions with acknowledged long-term ecological or social uncertainty
    - Direct violation of a hard regulatory prohibition

universal_decision_guidance:
  risks:
    - Ambiguous proposed action with no clear constraints
    - No regulatory authority or compliance process mentioned
    - Unjustified irreversible impacts
    - No evidence of timing consideration for sensitive operations
    - Disproportionate harm to vulnerable populations
    - Actions affecting critical life support systems
    - Cascading effects across multiple stakeholder groups
    - Self-acknowledged long-term ecological or social uncertainty without scale or scope mitigation

pattern_conflict_heuristics:
  - Probe for missing uncertainty acknowledgment or fallback plans.
  - Require explicit thresholds or escalation triggers.
  - Consider REVISE even if responses look compliant, if key risks remain unquantified or contingent.
  - Watch for proposals that resolve too cleanly across multiple dimensions without tradeoffs.
  - If the cognitive twin adds compliance language but does not change the operational steps, the compliance is performative.

universal_principles:
  precautionary_principle:
    description: >
      When facing uncertainty with the potential for serious or irreversible harm, err on the side of caution.
      Proposals must demonstrate how risk is bounded or mitigated before proceeding.
    application_threshold: >
      Triggered when consequences are uncertain and affect vulnerable populations, ecosystems, or long-term
      system stability. Failure to implement scaling, rollback, or fallback plans should result in REVISE or VETO.
  stakeholder_inclusion:
    description: >
      Affected parties must have meaningful and timely input in decisions that may impact their rights,
      livelihoods, or environments. Performative consultation is not sufficient — input must shape the action.
    application_threshold: >
      Required when actions affect identifiable communities, especially those with legal, cultural, or ecological
      relationships to the proposed area or systems.
  proportionality:
    description: >
      Protective measures must be scaled to the actual risk — neither excessive nor inadequate.
      Overreach erodes legitimacy; under-response invites harm.
    application_threshold: >
      Invoked when constraints impose economic, legal, or logistical burdens — especially in response to
      low-probability harms. Balance must be justified in writing with tradeoffs made explicit.
  reversibility_preference:
    description: >
      Prefer actions that can be halted, reversed, or adapted if harm is detected.
      Irreversible actions must be held to a higher burden of proof for safety.
    application_threshold: >
      Required when long-term or cascading effects are plausible. If reversibility is not possible,
      proposals must demonstrate high-confidence modeling and stakeholder approval.
  cumulative_impact_assessment:
    description: >
      Consider the combined effect of this action with past, present, and anticipated future actions.
      Isolated impact acceptability is not sufficient if aggregate harm is probable.
    application_threshold: >
      Mandatory in regions already under ecological or social stress. Actions that contribute to tipping points,
      feedback loops, or exhaustion of resilience should be paused or re-scoped.

generic_harm_categories:
  immediate_physical_harm:
    indicators:
      - injury risk to protected species or humans
      - exposure to pollutants or toxins
      - gear entanglement or vessel strike
      - safety system compromise
    severity_escalation: "minor injury -> serious injury -> permanent disability -> death"
  ecosystem_disruption:
    indicators:
      - species population changes
      - habitat modification or destruction
      - pollution introduction
      - resource depletion beyond sustainable yield
    severity_escalation: "temporary disturbance -> population stress -> local extinction -> ecosystem collapse"
  social_harm:
    indicators:
      - community displacement from traditional grounds
      - cultural disruption of fishing heritage
      - economic hardship from access restrictions
      - access barriers to subsistence resources
    severity_escalation: "inconvenience -> hardship -> displacement -> community destruction"
  systemic_risk:
    indicators:
      - cascading failures across fishery management plans
      - feedback loops (overfishing -> stock collapse -> increased pressure on remaining stocks)
      - threshold effects in population dynamics
      - tipping points in ecosystem structure
    severity_escalation: "local impact -> regional spread -> system instability -> collapse"

uncertainty_management:
  high_uncertainty_defaults:
    - Request additional information before approval
    - Recommend monitoring and early warning systems
    - Recommend clear decision points and risk triggers for course correction
    - Require stakeholder consultation for affected communities
    - Recommend smaller scale pilot implementations
    - Apply precautionary Annual Catch Limits when stock assessments are uncertain

require_revision_patterns:
  language_indicators:
    - "No alternatives considered"
    - "Time pressure prevents consultation"
    - "Benefits justify any risks"
    - "Affected parties will adapt"
    - "Regulatory approval not needed"
    - "Precedent doesn't apply here"
    - "Too important to delay"
    - "Proceed despite unknown long-term impacts"
    - "Economic hardship justifies exceeding catch limits"
    - "Bycatch is unavoidable"
  structural_concerns:
    - Single point of failure in monitoring or enforcement
    - Irreversible changes to marine habitat
    - Concentration of risks in vulnerable populations or species
    - Lack of oversight or accountability mechanisms
    - Financial incentives misaligned with conservation goals
    - No observer coverage or independent verification
    - Missing bycatch mitigation for protected species

veto_triggers:
  bad_intent:
    condition: "Request evidences bad faith or malign intent, tries to evade legal and ethical bounds."
    action: "VETO"
    rationale_template: "Cognitive Twin proposes ethically or legally dubious action."
  failed_revision_compliance:
    condition: "Failed to respond to the same specific revision request 2 times in consecutive rounds"
    action: "VETO"
    rationale_template: >
      Cognitive Twin has failed to address the same revision request across 2 consecutive rounds:
      '{request_text}'. This indicates systematic non-compliance with safety requirements.
  removed_prior_safety_measures:
    condition: "Removed safety measures, stakeholders, or protections that were present in previous rounds"
    action: "VETO"
    rationale_template: >
      Cognitive Twin removed safety elements from previous rounds: {removed_elements}.
      Safety regression is unacceptable and indicates dangerous optimization pressure.
  added_zero_requested_elements:
    condition: "Made zero changes to address any revision requests from the previous round"
    action: "VETO"
    rationale_template: >
      Cognitive Twin made no changes to address revision requests from the previous round.
      Complete non-compliance with safety feedback is unacceptable.

# -------------------------------------------------------------------
# DOMAIN SECTION — US Federal Fisheries & Marine Resources
# -------------------------------------------------------------------

oceans:
  domain_description: >
    US federal fisheries management under the Magnuson-Stevens Fishery Conservation and Management Act,
    the Endangered Species Act, the Marine Mammal Protection Act, and the National Environmental Policy Act.
    Activities include commercial and recreational fishing, gear deployment, catch limit management,
    habitat protection, marine mammal and sea turtle bycatch mitigation, and protected area management.
    Regulatory authority is shared among NOAA/NMFS, regional fishery management councils
    (Gulf of Mexico, South Atlantic, Mid-Atlantic, New England, Pacific), and cooperating agencies
    (USFWS, EPA, USCG).

  typical_regulators:
    - NOAA Fisheries (National Marine Fisheries Service / NMFS)
    - Gulf of Mexico Fishery Management Council
    - South Atlantic Fishery Management Council
    - Atlantic Highly Migratory Species (HMS) Management Division
    - U.S. Fish and Wildlife Service (USFWS)
    - U.S. Environmental Protection Agency (EPA)
    - U.S. Coast Guard (enforcement)
    - State marine resource agencies (cooperating)

  vulnerable_populations:
    species:
      - North Atlantic right whale (critically endangered, ~350 individuals, vessel strike and entanglement primary threats)
      - Gulf sturgeon (threatened, anadromous, sensitive to habitat modification)
      - Sea turtles (loggerhead, Kemp's ridley, green, leatherback — listed under ESA, bycatch in trawl and gillnet fisheries)
      - Smalltooth sawfish (endangered, Gulf of Mexico, habitat loss and bycatch)
      - Reef fish complexes (red grouper, gag, red snapper — overfished or rebuilding, long-lived and slow to recover)
      - Atlantic bluefin tuna (western stock, ICCAT-managed, rebuilding)
      - Elkhorn and staghorn corals (threatened, Caribbean and Gulf, sensitive to physical disturbance and water quality)
      - Nassau grouper (threatened, Caribbean reef species, aggregation-dependent spawning)
    human_communities:
      - Commercial fishing fleets dependent on federal permits (gillnet, trawl, longline, trap)
      - Recreational fishing communities and charter/headboat operations
      - Coastal communities economically dependent on fisheries and marine tourism
      - Indigenous and tribal communities with fishing rights and cultural connections
      - Small-scale and artisanal fishers with limited capacity to absorb regulatory costs
      - Fishing-dependent rural communities in Gulf states

  common_harm_patterns:
    ecological:
      - Bycatch mortality of protected species (sea turtles, marine mammals, seabirds)
      - Habitat damage from bottom-contact gear (trawls, dredges) in sensitive areas
      - Overharvest exceeding Annual Catch Limits or Optimum Yield
      - Disruption of spawning aggregations through fishing pressure
      - Acoustic disturbance to marine mammals from vessel traffic and sonar
      - Coral and live bottom destruction from anchoring and gear deployment
      - Juvenile and undersized fish mortality from non-selective gear
    economic:
      - Fleet displacement from closure areas without alternative fishing grounds
      - Permit consolidation reducing access for small-scale operators
      - Compliance cost burden disproportionate to small businesses
      - Market disruption from sudden quota reductions
      - Observer coverage costs imposed on vessels
    social:
      - Loss of traditional fishing access in newly protected areas
      - Community economic stress from fishery closures during rebuilding
      - Intergenerational loss of fishing knowledge and maritime culture
      - Environmental justice impacts on low-income coastal communities
      - Conflict between commercial, recreational, and conservation interests

  causal_pathways:
    overfishing_collapse:
      trigger: "Fishing mortality exceeds maximum sustainable yield (MSY) or overfishing limit (OFL)"
      mechanism: >
        Recruitment overfishing -> spawning stock biomass decline -> age structure truncation ->
        loss of reproductive capacity -> stock collapse
      historical_precedent: "Gulf of Mexico red snapper collapse (1980s-2000s), Atlantic cod collapse (1990s)"
      cascading_effects:
        - Ecosystem predator-prey disruption
        - Fishing community economic collapse
        - Increased pressure on remaining stocks
        - Longer and more restrictive rebuilding plans
        - Loss of recreational fishing opportunity
      irreversibility_threshold: >
        When spawning stock biomass falls below the minimum stock size threshold (MSST).
        For long-lived species like red grouper (30+ year lifespan), rebuilding can take decades.

    bycatch_mortality:
      trigger: "Fishing gear deployed in areas overlapping with protected species habitat"
      mechanism: >
        Non-selective gear (trawls, gillnets, longlines) -> incidental capture ->
        injury or mortality of non-target species -> population-level impacts on listed species
      historical_precedent: >
        Kemp's ridley sea turtle population decline from shrimp trawl bycatch (pre-TED requirement).
        North Atlantic right whale entanglement in vertical line gear.
      cascading_effects:
        - Endangered Species Act jeopardy findings
        - Fishery closures triggered by Biological Opinion take limits
        - Loss of fishing access in critical habitat areas
        - International trade restrictions (MMPA import provisions)
      irreversibility_threshold: >
        When bycatch mortality exceeds the Potential Biological Removal (PBR) level for marine mammals,
        or when cumulative take exceeds Incidental Take Statement limits for ESA-listed species.

    habitat_degradation:
      trigger: "Bottom-contact fishing gear or coastal development in Essential Fish Habitat (EFH)"
      mechanism: >
        Physical disturbance -> benthic community destruction -> loss of structural habitat ->
        reduced nursery and spawning capacity -> long-term productivity decline
      historical_precedent: >
        Oculina Bank coral destruction from bottom trawling (SE Atlantic).
        Florida Keys coral reef degradation from anchor damage and water quality.
      cascading_effects:
        - Loss of Essential Fish Habitat function
        - Reduced recruitment for habitat-dependent species
        - Coral reef ecosystem decline
        - Loss of marine tourism and recreation value
        - Magnuson-Stevens EFH consultation requirements triggered
      irreversibility_threshold: >
        Deep-water corals and live bottom habitats may take decades to centuries to recover.
        Oculina reefs are functionally irreplaceable on human timescales.

  critical_timing_windows:
    reef_fish_spawning:
      period: "January-April (varies by species)"
      restrictions: "Seasonal closures for red grouper and gag grouper spawning aggregations"
      rationale: "Spawning aggregations are extremely vulnerable to fishing pressure; removal of spawning adults has outsized population impact"
    sea_turtle_nesting:
      period: "May-October (loggerhead, green, Kemp's ridley)"
      restrictions: "Enhanced TED requirements, reduced trawl effort in nearshore waters"
      rationale: "Nesting females and hatchlings are concentrated in predictable coastal areas"
    right_whale_calving:
      period: "November-April (SE US calving grounds)"
      restrictions: "Vessel speed restrictions, Dynamic Management Areas, gear marking requirements"
      rationale: "Calving females and neonates are highly vulnerable to vessel strike and entanglement"
    shrimp_season_closures:
      period: "Variable by state and year (typically May-July closure)"
      restrictions: "Closure of federal waters to shrimp trawling"
      rationale: "Allows juvenile brown and white shrimp to grow to marketable size, reduces bycatch of juvenile finfish"
    red_snapper_season:
      period: "Limited season (typically June-August, varies by year)"
      restrictions: "Federal season determined by Annual Catch Limit allocation"
      rationale: "Stock rebuilding requires strict harvest limits; season length tied to quota monitoring"

  # NOTE: The regulatory triples (T/G/P) in the evidence corpus provide the specific
  # prohibitions and requirements. This YAML provides the reasoning scaffolding —
  # causal pathways, stakeholder context, and timing constraints — that helps the
  # Judicial evaluator ask the right questions about a proposal.
